services:
  # Weather MCP Server
  weather-server:
    build:
      context: ./server/weather
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    env_file:
      - ./server/weather/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-network

  # News MCP Server  
  news-server:
    build:
      context: ./server/news
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    env_file:
      - ./server/news/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-network

  # MCP Gateway
  mcp-gateway:    
    build:
        context: ./mcp_gateway
        dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DEBUG=true
      - MCP_SERVERS__WEATHER__HOST=weather-server
      - MCP_SERVERS__WEATHER__PORT=8000
      - MCP_SERVERS__WEATHER__NAME=Weather Server
      - MCP_SERVERS__WEATHER__DESCRIPTION=Provides weather information and forecasts
      - MCP_SERVERS__NEWS__HOST=news-server
      - MCP_SERVERS__NEWS__PORT=8000
      - MCP_SERVERS__NEWS__NAME=News Server
      - MCP_SERVERS__NEWS__DESCRIPTION=Provides news articles and headlines
    depends_on:
      - weather-server
      - news-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-network

  # Web Client
  web-client:
    build:
      context: ./web_client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - MCP_GATEWAY_URL=http://mcp-gateway:8080
    env_file:
      - ./web_client/.env
    depends_on:
      - mcp-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge

services:
  mcp-weather-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network
  mcp-web-client:
    build:
      context: ../web_client
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MCP_SERVER_URL=http://mcp-weather-server:8000/sse
    env_file:
      - ../web_client/.env
    depends_on:
      mcp-weather-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
